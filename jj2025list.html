<script>
    // 1. Chuyển Markdown thành HTML
    const mdSource = document.getElementById('markdown-source').innerText;
    const htmlContent = marked.parse(mdSource);
    document.getElementById('content').innerHTML = `<h2>📚 Danh sách truyện của tôi</h2>` + htmlContent;

    // 2. Tự động thêm Checkbox vào từng dòng của bảng
    const rows = document.querySelectorAll("table tbody tr");
    rows.forEach((row, index) => {
        const id = "book-" + index; // Tạo ID định danh dựa trên thứ tự dòng
        const firstCell = row.cells[0];
        
        // Tạo checkbox
        const chk = document.createElement("input");
        chk.type = "checkbox";
        chk.style.marginRight = "10px";
        
        // Chèn checkbox vào trước nội dung cột đầu tiên
        firstCell.prepend(chk);

        // Load trạng thái từ LocalStorage
        if (localStorage.getItem(id) === "done") {
            chk.checked = true;
            row.classList.add("done");
        }

        // Sự kiện lưu khi click
        chk.addEventListener("change", () => {
            if (chk.checked) {
                row.classList.add("done");
                localStorage.setItem(id, "done");
            } else {
                row.classList.remove("done");
                localStorage.removeItem(id);
            }
        });
    });
</script>
